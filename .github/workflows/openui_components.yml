name: openui_components

on:
  pull_request:
    paths:
      - .github/workflows/openui_components.yml
      - .github/workflows/flutter_package_workspace.yml
      - packages/openui_components/**
      - packages/openui/**
      - packages/openui_core/**
      - pubspec.yaml
      - pubspec.lock
  push:
    branches: [main]
    paths:
      - .github/workflows/openui_components.yml
      - .github/workflows/flutter_package_workspace.yml
      - packages/openui_components/**
      - packages/openui/**
      - packages/openui_core/**
      - pubspec.yaml
      - pubspec.lock

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/flutter_package_workspace.yml
    with:
      working_directory: packages/openui_components
      # Phase 0 scaffold: barrel is empty pending Phase 3 implementation.
      min_coverage: 0
      flutter_channel: stable
      flutter_version: 3.41.9
