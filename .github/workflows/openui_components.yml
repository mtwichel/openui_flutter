name: openui_components

on:
  pull_request:
    paths:
      - .github/workflows/openui_components.yml
      - packages/openui_components/**
      - packages/openui/**
      - packages/openui_core/**
  push:
    branches: [main]
    paths:
      - .github/workflows/openui_components.yml
      - packages/openui_components/**
      - packages/openui/**
      - packages/openui_core/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: packages/openui_components
      # Phase 0 scaffold: barrel is empty pending Phase 3 implementation.
      min_coverage: 0
      flutter_channel: stable
      flutter_version: 3.41.9
      setup: |
        bash "${{ github.workspace }}/tool/ci_pubspec_overrides.sh" packages/openui_components
        flutter pub get
