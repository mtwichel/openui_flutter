name: openui_core

on:
  pull_request:
    paths:
      - .github/workflows/openui_core.yml
      - .github/workflows/flutter_package_workspace.yml
      - packages/openui_core/**
      - pubspec.yaml
      - pubspec.lock
  push:
    branches: [main]
    paths:
      - .github/workflows/openui_core.yml
      - .github/workflows/flutter_package_workspace.yml
      - packages/openui_core/**
      - pubspec.yaml
      - pubspec.lock

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/flutter_package_workspace.yml
    with:
      working_directory: packages/openui_core
      min_coverage: 100
      flutter_channel: stable
      flutter_version: 3.41.9
