name: openui_flutter_example

on:
  pull_request:
    paths:
      - .github/workflows/openui_flutter_example.yml
      - .github/workflows/flutter_package_workspace.yml
      - apps/openui_flutter_example/**
      - packages/**
      - pubspec.yaml
      - pubspec.lock
  push:
    branches: [main]
    paths:
      - .github/workflows/openui_flutter_example.yml
      - .github/workflows/flutter_package_workspace.yml
      - apps/openui_flutter_example/**
      - packages/**
      - pubspec.yaml
      - pubspec.lock

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/flutter_package_workspace.yml
    with:
      working_directory: apps/openui_flutter_example
      min_coverage: 0
      flutter_channel: stable
      flutter_version: 3.41.9
