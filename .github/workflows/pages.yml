name: deploy example to pages

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/pages.yml
      - apps/openui_flutter_example/**
      - packages/openui/**
      - packages/openui_chat/**
      - packages/openui_components/**
      - packages/openui_core/**
      - pubspec.yaml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight deploys for the same branch — last push wins.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Public reCAPTCHA Enterprise site key — required by main.dart App Check
      # activation (same as local: --dart-define=RECAPTCHA_ENTERPRISE_SITE_KEY=…).
      RECAPTCHA_ENTERPRISE_SITE_KEY: 6LeM2eUsAAAAANLgIVH_B48GJuhCHCe_wctXL2PM
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Resolve workspace dependencies
        run: flutter pub get

      - name: Build web
        # base-href matches the GitHub Pages project path. The repo is
        # mtwichel/openui_flutter, so the deployed URL is
        # https://mtwichel.github.io/openui_flutter/.
        working-directory: apps/openui_flutter_example
        run: >-
          flutter build web --release --base-href /openui_flutter/
          --dart-define=RECAPTCHA_ENTERPRISE_SITE_KEY=$RECAPTCHA_ENTERPRISE_SITE_KEY

      - name: Configure Pages
        # Requires Pages to be enabled with the "GitHub Actions" source
        # in repo settings (Settings → Pages → Source). The
        # GITHUB_TOKEN cannot create the Pages site itself.
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/openui_flutter_example/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
