name: openui_flutter_example
description: Stubbed-LLM streaming chat demo for OpenUI Flutter.
version: 0.0.1+1
publish_to: none

resolution: workspace

environment:
  sdk: ^3.9.0
  flutter: ^3.35.0

dependencies:
  bloc: ^9.2.0
  dartantic_ai: ^3.4.0
  dartantic_firebase_ai: ^0.2.0
  equatable: ^2.0.8
  # Pinned: dartantic_firebase_ai 0.2.0 has a non-exhaustive switch on
  # FinishReason that breaks against firebase_ai >= 3.10.0 (the
  # FinishReason.blocklist case was added there). The pin cascades to
  # firebase_core via firebase_core_platform_interface (firebase_core
  # 4.8 uses platform_interface ^7, which conflicts with firebase_ai
  # <3.10's ^6). Remove the upper bound when dartantic_firebase_ai
  # releases a fix.
  firebase_ai: '>=3.8.0 <3.10.0'
  firebase_core: '>=4.4.0 <4.8.0'
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  http: ^1.6.0
  openui: ^0.1.0
  openui_components: ^0.1.0
  openui_core: ^0.1.0

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/scripts/
