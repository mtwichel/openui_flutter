name: openui_flutter

packages:
  - packages/*
  - apps/*

command:
  bootstrap:
    runPubGetInParallel: true

scripts:
  analyze:
    description: Run `dart analyze --fatal-infos` in pure-Dart packages.
    exec: dart analyze --fatal-infos
    packageFilters:
      flutter: false
  analyze:flutter:
    description: Run `flutter analyze --fatal-infos` in Flutter packages and apps.
    exec: flutter analyze --fatal-infos
    packageFilters:
      flutter: true

  format:
    description: Format every package and fail on changes.
    exec: dart format --set-exit-if-changed .

  test:
    description: Run pure-Dart tests with coverage.
    exec: dart test --coverage=coverage
    packageFilters:
      flutter: false
  test:flutter:
    description: Run Flutter tests with coverage.
    exec: flutter test --coverage
    packageFilters:
      flutter: true
      ignore:
        - openui_flutter_example

  publish:dry-run:
    description: Run `dart pub publish --dry-run` for every publishable package.
    exec: dart pub publish --dry-run
    packageFilters:
      noPrivate: true
