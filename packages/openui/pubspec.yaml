name: openui
description: >
  Flutter Renderer widget for OpenUI Lang. Owns the streaming parser,
  reactive store, error boundary, and form-state cache.
version: 0.0.1-dev.1
repository: https://github.com/VeryGoodOpenSource/openui_flutter
homepage: https://github.com/VeryGoodOpenSource/openui_flutter/tree/main/packages/openui
issue_tracker: https://github.com/VeryGoodOpenSource/openui_flutter/issues

environment:
  sdk: ^3.9.0
  flutter: ^3.35.0

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.16.0
  openui_core: ^0.0.1-dev.1

dev_dependencies:
  fake_async: ^1.3.3
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
