  Table, Markdown, Image, BarChart, LineChart, and friends.
version: 0.0.1-dev.2
repository: https://github.com/mtwichel/openui_flutter
homepage: https://github.com/mtwichel/openui_flutter/tree/main/packages/openui_components
issue_tracker: https://github.com/mtwichel/openui_flutter/issues

environment:
  sdk: ^3.9.0
  flutter: ^3.35.0

dependencies:
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  meta: ^1.16.0
  openui: ^0.0.1-dev.1
  openui_core: ^0.0.1-dev.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
