name: openui_core
description: >
  Pure-Dart core for OpenUI Flutter: lexer, parser, AST, streaming parser,
  evaluator, reactive store, library DSL, action steps, and tool-provider
  interface. The language layer that the Flutter renderer sits on top of.
version: 0.0.1-dev.1
repository: https://github.com/mtwichel/openui_flutter
homepage: https://github.com/mtwichel/openui_flutter/tree/main/packages/openui_core
issue_tracker: https://github.com/mtwichel/openui_flutter/issues

environment:
  sdk: ^3.9.0

dependencies:
  collection: ^1.19.1
  json_schema_builder: ^0.1.3
  meta: ^1.16.0

dev_dependencies:
  test: ^1.25.0
  very_good_analysis: ^10.2.0
