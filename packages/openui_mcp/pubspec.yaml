name: openui_mcp
description: >
  MCP `ToolProvider` for OpenUI Flutter. Wraps `mcp_dart`'s `McpClient`
  with the JS-reference-compatible `extractToolResult` envelope unwrap.
version: 0.0.1-dev.2
repository: https://github.com/mtwichel/openui_flutter
homepage: https://github.com/mtwichel/openui_flutter/tree/main/packages/openui_mcp
issue_tracker: https://github.com/mtwichel/openui_flutter/issues


environment:
  sdk: ^3.9.0

dependencies:
  mcp_dart: ^2.1.1
  meta: ^1.16.0
  openui_core: ^0.0.1-dev.1

dev_dependencies:
  test: ^1.25.0
  very_good_analysis: ^10.2.0
